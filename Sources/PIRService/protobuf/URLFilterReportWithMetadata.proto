syntax = "proto3";

import "URLFilterReport.proto";
import "google/protobuf/timestamp.proto";

// A report of URLs blocked by the URL filter on a device, along with metadata about when the report was received.
message URLFilterReportWithMetadata {
  // User-Agent header value from the device that submitted the report.
  string user_agent = 1;
  // Timestamp when the report was received by the server.
  google.protobuf.Timestamp received_at = 2;
  // The actual report.
  URLFilterReport report = 3;
}
