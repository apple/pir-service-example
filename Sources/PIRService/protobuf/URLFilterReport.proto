syntax = "proto3";

// A report of URLs blocked by the URL filter on a device.
message URLFilterReport {
  // List of blocked URLs.
  //
  // Each entry is the matched URL from the filter dataset, not the full URL the user visited. For example, if the
  // dataset contains "https://example.com/" and the user visits "https://example.com/xxx/yyy/zzz", the entry matches
  // and the report contains "https://example.com/".
  repeated string urls = 1;
}
